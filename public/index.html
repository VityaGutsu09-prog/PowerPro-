<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PowerPro Agent</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d0d;color:#f0f0f0;font-family:'Montserrat',sans-serif;padding:20px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:36px;color:#E8001D;letter-spacing:4px}
.logo span{color:#fff}
.sub{font-size:9px;letter-spacing:5px;color:#555;margin-bottom:24px}
.card{background:#141414;border:1px solid #222;border-radius:4px;padding:20px;margin-bottom:16px}
label{display:block;font-size:9px;letter-spacing:3px;color:#E8001D;margin-bottom:8px}
input,select,textarea{width:100%;background:#0a0a0a;border:1px solid #222;color:#f0f0f0;font-family:'Montserrat',sans-serif;font-size:13px;padding:10px;border-radius:3px;margin-bottom:12px}
textarea{min-height:70px;resize:vertical}
.btn{width:100%;padding:14px;background:#E8001D;color:#fff;border:none;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:4px;cursor:pointer;border-radius:3px;margin-bottom:8px}
.btn-green{background:#00cc66;color:#000}
.btn:disabled{opacity:0.5}
.result{background:#0a0a0a;border:1px solid #222;border-radius:3px;padding:16px;margin-top:12px;white-space:pre-wrap;font-size:13px;line-height:1.8;color:#ccc;display:none}
.copy-btn{background:transparent;border:1px solid #333;color:#555;font-size:9px;letter-spacing:2px;padding:4px 10px;cursor:pointer;border-radius:2px;margin-top:8px;font-family:'Montserrat',sans-serif}
.loader{display:none;text-align:center;padding:20px;color:#E8001D;font-family:'Bebas Neue',sans-serif;letter-spacing:3px;font-size:16px}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tag{background:rgba(232,0,29,0.1);border:1px solid rgba(232,0,29,0.2);color:#E8001D;font-size:11px;padding:3px 10px;border-radius:2px}
.img-preview{width:100%;border-radius:4px;margin-top:12px;display:none}
.status{padding:10px;border-radius:3px;font-size:12px;margin-top:8px;display:none}
.status-ok{background:rgba(0,204,102,0.1);border:1px solid #00cc66;color:#00cc66}
.status-err{background:rgba(232,0,29,0.1);border:1px solid #E8001D;color:#E8001D}
</style>
</head>
<body>
<div class="logo">POWER<span>PRO</span></div>
<div class="sub">AI КОНТЕНТ АГЕНТ · РОССИЯ</div>

<div class="card">
  <label>ТЕМА / ПРОДУКТ</label>
  <input type="text" id="topic" placeholder="Протеин, BCAA, акция..." value="Протеиновый коктейль">
  <label>ТИП КОНТЕНТА</label>
  <select id="type">
    <option value="promo">Реклама / Акция</option>
    <option value="educational">Польза / Инфо</option>
    <option value="motivational">Мотивация</option>
    <option value="product">Обзор продукта</option>
  </select>
  <label>ДОПОЛНИТЕЛЬНО</label>
  <textarea id="extra" placeholder="Скидка 20%, новый вкус..."></textarea>
  <button class="btn" id="btn" onclick="generate()">⚡ СГЕНЕРИРОВАТЬ ТЕКСТ</button>
</div>

<div class="loader" id="loader">ГЕНЕРИРУЮ...</div>

<div class="card" id="vkCard" style="display:none">
  <label>ВКОНТАКТЕ — ПОСТ</label>
  <div class="result" id="vkPost"></div>
  <button class="copy-btn" onclick="copy('vkPost')">КОПИРОВАТЬ</button>
  <label style="margin-top:12px">ХЭШТЕГИ</label>
  <div class="tags" id="vkTags"></div>
  <br>
  <button class="btn" id="imgBtn" onclick="generateImage()">🎨 СГЕНЕРИРОВАТЬ КАРТИНКУ</button>
  <img id="imgPreview" class="img-preview">
  <div class="loader" id="imgLoader">ГЕНЕРИРУЮ КАРТИНКУ...</div>
  <button class="btn btn-green" id="vkBtn" onclick="postToVK()" style="display:none">📤 ОПУБЛИКОВАТЬ В ВК</button>
  <div class="status" id="vkStatus"></div>
</div>

<div class="card" id="igCard" style="display:none">
  <label>INSTAGRAM — CAPTION</label>
  <div class="result" id="igCaption"></div>
  <button class="copy-btn" onclick="copy('igCaption')">КОПИРОВАТЬ</button>
  <label style="margin-top:12px">СЦЕНАРИЙ REELS</label>
  <div class="result" id="igScript"></div>
  <button class="copy-btn" onclick="copy('igScript')">КОПИРОВАТЬ</button>
  <label style="margin-top:12px">ХЭШТЕГИ</label>
  <div class="tags" id="igTags"></div>
</div>

<script>
let generatedImageBase64 = null;
let vkPostText = '';

async function generate(){
  const topic=document.getElementById('topic').value.trim();
  if(!topic){alert('Введи тему!');return;}
  const type=document.getElementById('type').value;
  const extra=document.getElementById('extra').value;
  document.getElementById('btn').disabled=true;
  document.getElementById('loader').style.display='block';
  document.getElementById('vkCard').style.display='none';
  document.getElementById('igCard').style.display='none';
  const types={promo:'рекламный',educational:'информационный',motivational:'мотивационный',product:'обзор продукта'};
  const system='Ты контент-менеджер PowerPro (спортпит, Россия). Отвечай ТОЛЬКО валидным JSON без markdown.';
  const prompt=`Создай ${types[type]} контент для ВКонтакте и Instagram.\nПродукт: ${topic}\n${extra?'Детали: '+extra:''}\nJSON: {"vk":{"post":"текст поста","hashtags":["#тег1","#тег2","#тег3","#тег4","#тег5"]},"ig":{"caption":"caption текст","reels_script":"сценарий по секундам","hashtags":["#tag1","#tag2","#tag3","#tag4","#tag5"]}}`;
  try{
    const res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:2000,system,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    if(data.error){throw new Error(JSON.stringify(data.error));}
    const raw=(data.content||[]).map(i=>i.text||'').join('').trim().replace(/^```[a-z]*\n?/i,'').replace(/```$/,'').trim();
    const d=JSON.parse(raw);
    if(d.vk){
      vkPostText=d.vk.post+'\n\n'+d.vk.hashtags.join(' ');
      document.getElementById('vkPost').textContent=d.vk.post;
      document.getElementById('vkPost').style.display='block';
      document.getElementById('vkTags').innerHTML=d.vk.hashtags.map(t=>`<span class="tag">${t}</span>`).join('');
      document.getElementById('vkCard').style.display='block';
    }
    if(d.ig){
      document.getElementById('igCaption').textContent=d.ig.caption;
      document.getElementById('igCaption').style.display='block';
      document.getElementById('igScript').textContent=d.ig.reels_script;
      document.getElementById('igScript').style.display='block';
      document.getElementById('igTags').innerHTML=d.ig.hashtags.map(t=>`<span class="tag">${t}</span>`).join('');
      document.getElementById('igCard').style.display='block';
    }
  }catch(e){alert('Ошибка: '+e.message);}
  document.getElementById('btn').disabled=false;
  document.getElementById('loader').style.display='none';
}

// ─── Цвета атмосферы по типу контента ───────────────────────────────────────
const moodColors = {
  promo:       { glow: 'rgba(232,0,29,0.35)',   accent: 'rgba(255,180,0,0.12)',  label: 'АКЦИЯ' },
  educational: { glow: 'rgba(0,120,255,0.30)',  accent: 'rgba(0,200,255,0.10)',  label: 'ПОЛЬЗА' },
  motivational:{ glow: 'rgba(0,200,80,0.28)',   accent: 'rgba(0,255,120,0.08)',  label: 'МОТИВАЦИЯ' },
  product:     { glow: 'rgba(180,120,255,0.28)',accent: 'rgba(140,80,255,0.10)', label: 'ОБЗОР' }
};

function addLogoToImage(srcUrl, isBase64, base64data){
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.crossOrigin = 'anonymous';

  img.onload = function(){
    const W = 1080, H = 1080;
    canvas.width = W;
    canvas.height = H;

    const type = document.getElementById('type').value;
    const mood = moodColors[type] || moodColors.promo;

    // ── Фон: глубокий чёрный с радиальным градиентом ──
    const bg = ctx.createRadialGradient(W*0.4, H*0.35, 0, W*0.5, H*0.5, W*0.85);
    bg.addColorStop(0, '#1a0a0a');
    bg.addColorStop(0.55, '#0d0d0d');
    bg.addColorStop(1, '#000000');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // ── Акцентный цвет сверху-слева (по типу контента) ──
    const topGlow = ctx.createRadialGradient(0, 0, 0, W*0.15, H*0.15, W*0.6);
    topGlow.addColorStop(0, mood.accent);
    topGlow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = topGlow;
    ctx.fillRect(0, 0, W, H);

    // ── Красный градиент снизу (всегда — фирменный) ──
    const redBottom = ctx.createLinearGradient(0, H*0.65, 0, H);
    redBottom.addColorStop(0, 'rgba(232,0,29,0)');
    redBottom.addColorStop(1, 'rgba(232,0,29,0.22)');
    ctx.fillStyle = redBottom;
    ctx.fillRect(0, 0, W, H);

    // ── Диагональные линии бренда ──
    ctx.strokeStyle = 'rgba(232,0,29,0.05)';
    ctx.lineWidth = 1;
    for(let i = -H; i < W + H; i += 44){
      ctx.beginPath();
      ctx.moveTo(i, 0);
      ctx.lineTo(i + H, H);
      ctx.stroke();
    }

    // ── Позиция и размер продукта ──
    const scale = Math.min(W * 0.78 / img.width, H * 0.72 / img.height);
    const pw = img.width * scale;
    const ph = img.height * scale;
    const px = (W - pw) / 2;
    const py = (H - ph) / 2 - 40;

    // ── Светящийся ореол под продуктом (по типу контента) ──
    const glowGrad = ctx.createRadialGradient(W/2, py+ph*0.75, 0, W/2, py+ph*0.75, pw*0.6);
    glowGrad.addColorStop(0, mood.glow);
    glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glowGrad;
    ctx.fillRect(0, 0, W, H);

    // ── Тень продукта ──
    ctx.shadowColor = 'rgba(0,0,0,0.9)';
    ctx.shadowBlur = 80;
    ctx.shadowOffsetY = 40;
    ctx.drawImage(img, px, py, pw, ph);
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;

    // ── Полоса внизу с градиентом ──
    const strip = ctx.createLinearGradient(0, H*0.88, 0, H);
    strip.addColorStop(0, 'rgba(232,0,29,0)');
    strip.addColorStop(1, 'rgba(232,0,29,0.55)');
    ctx.fillStyle = strip;
    ctx.fillRect(0, H*0.88, W, H*0.12);

    // ── Текст POWERPRO на полосе ──
    ctx.font = 'bold 52px "Bebas Neue", Impact, sans-serif';
    ctx.letterSpacing = '6px';
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.textBaseline = 'middle';
    ctx.fillText('POWER', 36, H * 0.945);
    ctx.fillStyle = '#E8001D';
    const powerW = ctx.measureText('POWER').width;
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    // Рисуем PRO другим цветом через две части
    ctx.fillStyle = '#E8001D';
    ctx.font = 'bold 52px "Bebas Neue", Impact, sans-serif';

    // ── Метка типа контента (правый верхний угол) ──
    ctx.font = '600 18px Montserrat, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.textBaseline = 'top';
    const label = mood.label;
    const lw = ctx.measureText(label).width;
    ctx.fillStyle = 'rgba(232,0,29,0.18)';
    ctx.fillRect(W - lw - 32, 24, lw + 24, 34);
    ctx.fillStyle = '#E8001D';
    ctx.fillText(label, W - lw - 20, 31);

    // ── Логотип ──
    const logo = new Image();
    logo.crossOrigin = 'anonymous';

    const finalize = () => {
      const final = canvas.toDataURL('image/jpeg', 0.95);
      generatedImageBase64 = final.split(',')[1];
      document.getElementById('imgPreview').src = final;
      document.getElementById('imgPreview').style.display = 'block';
      document.getElementById('vkBtn').style.display = 'block';
      document.getElementById('imgBtn').disabled = false;
      document.getElementById('imgLoader').style.display = 'none';
    };

    logo.onload = function(){
      const lw = W * 0.28;
      const lh = logo.height * (lw / logo.width);
      // Логотип в правом нижнем углу, поверх полосы
      ctx.globalAlpha = 0.9;
      ctx.drawImage(logo, W - lw - 28, H - lh - 20, lw, lh);
      ctx.globalAlpha = 1;
      finalize();
    };
    logo.onerror = finalize;
    logo.src = 'https://raw.githubusercontent.com/VityaGutsu09-prog/PowerPro-/main/4EBF0288-80E1-4910-9E9E-8E38456C1220.png';
  };

  img.src = isBase64 ? 'data:image/png;base64,' + base64data : srcUrl;
}

async function generateImage(){
  document.getElementById('imgBtn').disabled = true;
  document.getElementById('imgLoader').style.display = 'block';
  document.getElementById('imgPreview').style.display = 'none';
  document.getElementById('vkBtn').style.display = 'none';

  const topic = document.getElementById('topic').value.trim();
  const type  = document.getElementById('type').value;

  // ← Передаём оба параметра для умного промпта на сервере
  const promptText = `${topic} [type:${type}]`;

  try{
    const res = await fetch('/api/image', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ prompt: promptText })
    });
    const data = await res.json();

    if(data.productImage){
      addLogoToImage(data.productImage, false, null);
      return;
    } else if(data.artifacts && data.artifacts[0]){
      addLogoToImage(null, true, data.artifacts[0].base64);
      return;
    } else {
      throw new Error('Нет картинки в ответе: ' + JSON.stringify(data));
    }
  } catch(e){
    alert('Ошибка картинки: ' + e.message);
    document.getElementById('imgBtn').disabled = false;
    document.getElementById('imgLoader').style.display = 'none';
  }
}

async function postToVK(){
  document.getElementById('vkBtn').disabled=true;
  const status=document.getElementById('vkStatus');
  status.style.display='block';
  status.className='status';
  status.textContent='Публикую в ВКонтакте...';
  try{
    const res=await fetch('/api/vk-post',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:vkPostText,imageBase64:generatedImageBase64})});
    const data=await res.json();
    if(data.response&&data.response.post_id){
      status.className='status status-ok';
      status.textContent='✅ Пост опубликован в ВКонтакте! ID: '+data.response.post_id;
    }else{
      throw new Error(JSON.stringify(data));
    }
  }catch(e){
    status.className='status status-err';
    status.textContent='❌ Ошибка: '+e.message;
  }
  document.getElementById('vkBtn').disabled=false;
}

function copy(id){
  navigator.clipboard.writeText(document.getElementById(id).textContent);
  alert('Скопировано!');
}
</script>

</body>
</html>
